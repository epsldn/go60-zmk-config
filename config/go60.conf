# --- CORE POINTING ---
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_USB=y

# --- CUSTOM MODULES ---
CONFIG_ZMK_ANTI_IDLE=y

# --- PERFORMANCE ---
CONFIG_USB_HID_POLL_INTERVAL_MS=1
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# --- POWER MANAGEMENT ---
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_TIMEOUT=300000
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=3600000
