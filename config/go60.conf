# --- 1000Hz (1ms) Polling for Mac (Wired) ---
CONFIG_USB_HID_POLL_INTERVAL_MS=1
CONFIG_ZMK_USB=y

# --- Bluetooth Inter-half Sync (Overclock) ---
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=6
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# --- RGB Defaults (Start OFF) ---
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=n

# These values must remain valid (e.g., BRT=2) to pass Zephyr's 
# strict compiler checks, even though the lights start turned off.
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=0
CONFIG_ZMK_RGB_UNDERGLOW_SAT_START=0
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=2

# --- Core Features & Power ---
CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_ANTI_IDLE=y
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_TIMEOUT=300000
