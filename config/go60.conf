# --- 1. CORE POINTING & MOUSE ---
# Enables the base ZMK mouse movement and clicking engine
CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_POINTING=y

# --- 2. TRACKPAD HARDWARE ---
# Ensures both Cirque trackpads are powered and sending data
CONFIG_ZMK_INPUT_CIRQUE_LH=y
CONFIG_ZMK_INPUT_CIRQUE_RH=y

# --- 3. CUSTOM MODULES ---
# REQUIRED: Enables the logic for inertial-cursor and zip_gestures
CONFIG_ZMK_INPUT_PROCESSORS=y
# REQUIRED: Enables the background process for the jiggler
CONFIG_ZMK_ANTI_IDLE=y

# --- 4. PERFORMANCE TUNING ---
# Sets the USB polling to 1ms (1000Hz) for the smoothest "flick" feel
CONFIG_USB_HID_POLL_INTERVAL_MS=1
# Increases Bluetooth transmit power to prevent cursor "jitter"
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# --- 5. POWER MANAGEMENT ---
# Ensures the jiggler doesn't get killed by aggressive sleep settings
CONFIG_ZMK_IDLE_TIMEOUT=300000
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=3600000
