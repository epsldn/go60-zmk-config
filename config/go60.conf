# --- 1000Hz (1ms) Polling for Mac (Wired) ---
CONFIG_USB_HID_POLL_INTERVAL_MS=1
CONFIG_ZMK_USB=y
CONFIG_ZMK_USB_BOOT=n

# --- Snappy Bluetooth (The 90Hz Sync Fix) ---
# Forces minimum 7.5ms interval (6 * 1.25ms) for split/macOS BLE sync
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=6

# --- Core Features ---
CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_ANTI_IDLE=y

# --- RGB Backdrop (White @ 40% Brightness per MoErgo limit) ---
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=y
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=0
CONFIG_ZMK_RGB_UNDERGLOW_SAT_START=0
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=40

# --- Power & Split Sync ---
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_TIMEOUT=300000
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=3600000
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
