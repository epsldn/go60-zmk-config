# --- 1ms Polling for Mac ---
CONFIG_USB_HID_POLL_INTERVAL_MS=1
CONFIG_ZMK_USB=y

# --- Core Features ---
CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_ANTI_IDLE=y

# --- Power & BT ---
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_TIMEOUT=300000
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=3600000
